name: Auto Firmware Dumper

on:
  workflow_dispatch:
    inputs:
      USER_NAME:
        description: 'Name of your GitHub Account'
        required: true
        default: 'isus203'
      USER_EMAIL:
        description: 'E-mail of your GitHub Account'
        required: true
        default: ''
      FIRMWARE_URL:
        description: 'Stock ROM Link Google Drive '
        required: true
        default: ''
      VENDOR_NAME:
        description: 'Device manufacturer'
        required: true
        default: ''
      CODE_NAME:
        description: 'Code name '
        required: true
        default: ''
      GENERATE_VENDOR:
        description: 'Create Vendor Tree'
        required: true
        default: 'false'
        type: boolean
      UPLOAD_LINEAGE_DT:
        description: 'Upload LineageOS tree'
        required: true
        default: 'false'
        type: boolean
      UPLOAD_TWRP_DT:
        description: 'Upload TWRP tree'
        required: true
        default: 'false'
        type: boolean

jobs:
  dump:
    name: Auto Firmware Dumper
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GTOKEN }}
      TWT: ${{ github.event.inputs.UPLOAD_TWRP_DT }}
      LOT: ${{ github.event.inputs.UPLOAD_LINEAGE_DT }}
      GVT: ${{ github.event.inputs.GENERATE_VENDOR }}
      FUR: ${{ github.event.inputs.FIRMWARE_URL }}
      VENDOR: ${{ github.event.inputs.VENDOR_NAME }}
      CODE: ${{ github.event.inputs.CODE_NAME }}
      UN: ${{ github.event.inputs.USER_NAME }}
      UEM: ${{ github.event.inputs.USER_EMAIL }}
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: rokibhasansagar/slimhub_actions@main
    - uses: sersoft-gmbh/setup-gh-cli-action@v2
      with:
        version: stable
          
    - name: Clone and Setup DumprX
      run: |
        git clone https://github.com/DumprX/DumprX
        cd DumprX
        sudo chmod +x *.sh
        bash setup.sh
        pip3 install aospdtgen twrpdtgen
      
    - name: Install UV
      run: curl -LsSf https://astral.sh/uv/install.sh | sh
        
    - name: Update Packages
      run: |
        sudo apt update
        sudo apt -y upgrade
        sudo apt -y install cpio aria2 git python3 neofetch tar gzip  p7zip-full python3-pip lz4 erofs-utils f2fs-tools libvixl-dev
        pip install gdown

    - name: Setup GithubCLI
      run: |
        type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
        && sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
        && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
        && sudo apt update \
        && sudo apt install gh -y
        
    - name: Authorize Git And GitHub CLI
      run: |
        git config --global user.name "${{ env.UN }}"
        git config --global user.email "${{ env.UEM }}"

        # Оптимизация сети
        git config --global http.postBuffer 524288000
        git config --global http.version HTTP/1.1
        # Уменьшаем сжатие, чтобы не вылететь по памяти
        git config --global core.compression 1
        
        # Настройка лимитов памяти для упаковки объектов
        git config --global pack.windowMemory "512m"
        git config --global pack.packSizeLimit "512m"
        git config --global pack.threads "1"

        # Принудительно устанавливаем URL с токеном
        git remote set-url origin https://x-access-token:${{ secrets.GTOKEN }}@github.com/${{ github.repository }}.git

        # Если файлов ОЧЕНЬ много, можно попробовать сделать "чистку" перед пушем
        git gc --prune=now --aggressive
        unset GITHUB_TOKEN
        
        gh auth login --with-token <<< "${{ secrets.GTOKEN }}"
      working-directory: ${{ github.workspace }}
  
    - name: Install firmware 
      run: |
        cd DumprX
        gdown "${{ env.FUR }}" -O firmware.zip
      working-directory: ${{ github.workspace }}
        
    - name: Create Dump
      run: |
        cd DumprX
        bash dumper.sh ./firmware.zip
        sudo chown -R $USER:$USER out
        sudo chmod -R 755 out
      working-directory: ${{ github.workspace }}

    - name: Extract Device Info
      run: |
        cd DumprX/out
        
        # Функция для очистки
        clean_val() {
            echo "$1" | head -1 | sed 's/[[:space:]]//g' | tr -d '\r'
        }

        # Функция для проверки, является ли значение бесполезным (заглушкой)
        is_trash() {
            local val=$(echo "$1" | tr '[:upper:]' '[:lower:]')
            [[ -z "$1" || "$val" == "alps" || "$val" == "unknown" || "$val" == "generic" || "$val" == "mainline" ]]
        }

        # Определяем приоритет файлов (сначала product и vendor, потом всё остальное)
        PROPS_PRIORITY=$(ls product/build.prop vendor/build.prop odm/build.prop system/system/build.prop system/build.prop 2>/dev/null || find . -name "*.prop")

        # --- ИЗВЛЕЧЕНИЕ BRAND ---
        for file in $PROPS_PRIORITY; do
            val=$(grep -ahP "(?<=^ro.product.manufacturer=).*" "$file" | head -1)
            [[ -z "$val" ]] && val=$(grep -ahP "(?<=^ro.product.brand=).*" "$file" | head -1)
            val=$(clean_val "$val")
            if ! is_trash "$val"; then
                brand="$val"
                break
            fi
        done

        # --- ИЗВЛЕЧЕНИЕ CODENAME (Model) ---
        for file in $PROPS_PRIORITY; do
            val=$(grep -ahP "(?<=^ro.product.model=).*" "$file" | head -1)
            [[ -z "$val" ]] && val=$(grep -ahP "(?<=^ro.product.device=).*" "$file" | head -1)
            val=$(clean_val "$val")
            if ! is_trash "$val"; then
                codename="$val"
                break
            fi
        done

        # --- ИЗВЛЕЧЕНИЕ VERSION & FINGERPRINT ---
        # Для них обычно достаточно первого совпадения из приоритетных файлов
        version=$(grep -ahP "(?<=^ro.build.version.release=).*" $PROPS_PRIORITY | grep -v "unknown" | head -1 | tr -d '\r')
        fingerprint=$(grep -ahP "(?<=^ro.build.fingerprint=).*" $PROPS_PRIORITY | head -1 | tr -d '\r')

        # Фоллбэк (если всё еще пусто)
        [[ -z "$brand" ]] && brand="unknown"
        [[ -z "$codename" ]] && codename="device_$(date +%H%M)"
        
        # Финальная очистка для папок (только мелкие буквы)
        folder_brand=$(echo "$brand" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]//g')
        folder_codename=$(echo "$codename" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]//g')

        echo "========================================"
        echo "BRAND       : $brand"
        echo "CODENAME    : $codename"
        echo "VERSION     : $version"
        echo "========================================"

        echo "$folder_codename" > ${{ github.workspace }}/codename.txt
        echo "$folder_brand" > ${{ github.workspace }}/brand.txt
        echo "$version" > ${{ github.workspace }}/version.txt
        echo "$fingerprint" > ${{ github.workspace }}/fingerprint.txt

    - name: Uploading ROM Dump
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        codename=$(cat ${{ github.workspace }}/codename.txt)
        brand=$(cat ${{ github.workspace }}/brand.txt)
        version=$(cat ${{ github.workspace }}/version.txt)
        repo_name="dump_${brand}_${codename}"
        dat=$(date +%Y%m%d)
        
        cd DumprX/out
        
        sudo rm -rf .git
        git config --global init.defaultBranch main
        git init
        git branch -M dump-"$codename"-"$dat"
        git add .
        git commit -s -m "Dump for $brand $codename (Android $version)"
        
        # Проверка и создание репозитория
        if gh repo view "${{ github.repository_owner }}/$repo_name" >/dev/null 2>&1; then
          git remote add origin "https://github.com/${{ github.repository_owner }}/$repo_name.git"
          git push -u origin dump-"$codename"-"$dat" --force
        else
          gh repo create "$repo_name" --public --description="Dump for $brand $codename" --source=. --remote=origin --push
        fi

        # Подготовка структуры для следующих шагов
        mkdir -p ${{ github.workspace }}/vnd_project/dump
        mkdir -p ${{ github.workspace }}/vnd_project/android/device/"$brand"/"$codename"
        [ -d "lineage-device-tree" ] && mv lineage-device-tree/* ${{ github.workspace }}/vnd_project/android/device/"$brand"/"$codename"/
        mv * ${{ github.workspace }}/vnd_project/dump/ 2>/dev/null || true

    - name: Create vendor tree
      if: env.GVT == 'true'
      run: |
        codename=$(cat ${{ github.workspace }}/codename.txt)
        brand=$(cat ${{ github.workspace }}/brand.txt)
        
        cd ${{ github.workspace }}/vnd_project
        if [ -d android/device/"$brand"/"$codename" ]; then
           git clone --depth=1 https://github.com/LineageOS/android_tools_extract-utils -b lineage-22.1 ./android/tools/extract-utils
           git clone --depth=1 https://github.com/LineageOS/android_prebuilts_extract-tools -b lineage-22.1 ./android/prebuilts/extract-tools
           
           sudo chmod 777 android/device/"$brand"/"$codename"/*.sh
           cd android/device/"$brand"/"$codename"
           bash extract-files.sh ${{ github.workspace }}/vnd_project/dump/
        else
           echo "LINEAGEOS DEVICE TREE NOT FOUND!"
           exit 1
        fi

    - name: Uploading Vendor Tree
      if: env.GVT == 'true'
      env:
        GH_TOKEN: ${{ secrets.GTOKEN }}
      run: |
        codename=$(cat ${{ github.workspace }}/codename.txt)
        brand=$(cat ${{ github.workspace }}/brand.txt)
        
        cd ${{ github.workspace }}/vnd_project/android/vendor/"$brand"/"$codename"
        git init
        git branch -M vendor-"$codename"-$(date +%Y%m%d)
        git add .
        git commit -s -m "$codename: initial vendor tree"
        gh repo create android_vendor_"$brand"_"$codename" --public --description="Vendor tree for $codename" --source=. --remote=origin --push
        echo "🌳 **Vendor Tree:** [android_vendor_${brand}_${codename}](https://github.com/${{ github.repository_owner }}/android_vendor_${brand}_${codename})" >> $GITHUB_STEP_SUMMARY

    - name: Uploading LineageOS Device Tree
      if: env.LOT == 'true'
      env:
        GH_TOKEN: ${{ secrets.GTOKEN }}
      run: |
        codename=$(cat ${{ github.workspace }}/codename.txt)
        brand=$(cat ${{ github.workspace }}/brand.txt)
        cd ${{ github.workspace }}/vnd_project/android/device/"$brand"/"$codename"
        git init
        git branch -M lineage-"$codename"-$(date +%Y%m%d)
        git add .
        git commit -s -m "$codename: LineageOS device tree"
        gh repo create lineage_device_"$brand"_"$codename" --public --description="LineageOS tree for $codename" --source=. --remote=origin --push
      continue-on-error: true

    - name: Uploading preview of images
      uses: actions/upload-artifact@v4
      with: 
        name: Prewiew images
        path: |
          /home/Auto-Firmware-Dumper/boot.img
          /home/Auto-Firmware-Dumper/recovery.img
          /home/Auto-Firmware-Dumper/vendor_boot.img
          /home/Auto-Firmware-Dumper/init_boot.img
          /home/Auto-Firmware-Dumper/dtbo.img
          /home/Auto-Firmware-Dumper/dtb.img
        if-no-files-found: ignore
      continue-on-error: true
